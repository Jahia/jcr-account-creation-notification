# default configuration - won't be overridden

# JCR Account Creation Notification - Mail configuration
# Changes to this file are applied immediately without restarting the module.

# Optional: custom recipient email address.
# If not set, falls back to the Jahia default mail recipient.
#recipient=security-team@example.com

# Optional: custom sender email address.
# If not set, falls back to the Jahia default mail sender.
#sender=jahia-alerts@example.com

# Email subject template.
# Available token: {server} (server hostname)
subject=[{server}] JCR account creation notification

# Email body template.
# Available tokens: {username} (created username), {creator} (who created the account), {time} (creation timestamp)
body=<p>Hi,</p><p>We're sending this email following the creation of a JCR user account.</p><p>Username: {username}<br>Created by: {creator}<br>Creation time: {time}</p><p>This email is meant to raise awareness about the security of your services and to help you to protect them.</p><p>Regards,</p>
